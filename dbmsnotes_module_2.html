      .notes-container {

        transition: 0.3s ease;

      .note-folder:hover {
        transform: scale(1.05);
        background: #f0fff0;
      }

      .note-folder a {
        text-decoration: none;
        color: #333;
        font-weight: bold;
        display: block;
      }
